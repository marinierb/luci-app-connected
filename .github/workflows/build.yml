name: Build Package

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  PKG_NAME: luci-app-connected

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86-64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Package Version
        run: |
          PKG_VERSION=$(grep '^PKG_VERSION' Makefile | cut -d= -f2 | tr -d ' ')
          PKG_RELEASE=$(grep '^PKG_RELEASE' Makefile | cut -d= -f2 | tr -d ' ')
          echo "PKG_VERSION=$PKG_VERSION" >> $GITHUB_ENV
          echo "PKG_RELEASE=$PKG_RELEASE" >> $GITHUB_ENV

      - name: Prepare feed structure
        run: |
          mkdir -p ${{ env.PKG_NAME }}
          cp Makefile ${{ env.PKG_NAME }}/
          cp -r htdocs ${{ env.PKG_NAME }}/
          cp -r root ${{ env.PKG_NAME }}/
          echo "Feed structure:"
          find ${{ env.PKG_NAME }} -maxdepth 3

      - name: Build
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: ${{ matrix.arch }}-25.12.0
          FEEDNAME: packages_ci
          PACKAGES: ${{ env.PKG_NAME }}
          NO_REFRESH_CHECK: true
          V: s

      - name: Collect artifacts
        run: |
          mkdir -p output
          cp bin/packages/${{ matrix.arch }}/packages_ci/*.apk output/ || true
          if [ -z "$(ls output/*.apk 2>/dev/null)" ]; then
            echo "ERROR: No .apk found after build" >&2
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.arch }}
          path: output/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.PKG_NAME }} ${{ env.PKG_VERSION }}-${{ env.PKG_RELEASE }}"
          files: output/*.apk
