name: Build Package

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: ${{ matrix.arch }} build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - aarch64_cortex-a53

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Package Version
        run: |
          PKG_VERSION=$(grep '^PKG_VERSION' luci-app-connected/Makefile | cut -d= -f2 | tr -d ' ')
          PKG_RELEASE=$(grep '^PKG_RELEASE' luci-app-connected/Makefile | cut -d= -f2 | tr -d ' ')
          echo "PKG_VERSION=$PKG_VERSION" >> $GITHUB_ENV
          echo "PKG_RELEASE=$PKG_RELEASE" >> $GITHUB_ENV

      - name: Set SDK Architecture
        run: |
          echo "SDK_ARCH=${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Build
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: ${{ env.SDK_ARCH }}
          PACKAGES: luci-app-connected
          V: s

      - name: Store packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-packages
          path: bin/packages/${{ matrix.arch }}/action/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.PKG_VERSION }}${{ env.PKG_RELEASE != '1' && format('-{0}', env.PKG_RELEASE) || '' }}"
          files: bin/packages/${{ matrix.arch }}/action/*.apk

      - name: Deploy to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Copy APK files to temp location before switching branches
          mkdir -p /tmp/${{ matrix.arch }}
          cp bin/packages/${{ matrix.arch }}/action/*.apk /tmp/${{ matrix.arch }}/

          # Reset and create/checkout gh-pages branch
          git reset --hard
          git clean -fd

          # Create or checkout gh-pages
          if git rev-parse --verify origin/gh-pages > /dev/null 2>&1; then
            # Branch exists on remote, checkout it
            git checkout gh-pages
            git pull origin gh-pages
          else
            # Branch doesn't exist, create orphan
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          # Copy APK files
          mkdir -p ${{ matrix.arch }}
          cp /tmp/${{ matrix.arch }}/*.apk ${{ matrix.arch }}/

          # Add and commit
          git add ${{ matrix.arch }}/
          git commit -m "Update packages for ${{ matrix.arch }} - $(date +%Y-%m-%d)" && git push -u origin gh-pages || echo "Nothing to push"
