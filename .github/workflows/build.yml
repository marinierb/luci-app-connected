name: Build Package

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.arch }} build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - mediatek/filogic

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Package Version
        run: |
          PKG_VERSION=$(grep '^PKG_VERSION' luci-app-connected/Makefile | cut -d= -f2 | tr -d ' ')
          PKG_RELEASE=$(grep '^PKG_RELEASE' luci-app-connected/Makefile | cut -d= -f2 | tr -d ' ')
          echo "PKG_VERSION=$PKG_VERSION" >> $GITHUB_ENV
          echo "PKG_RELEASE=$PKG_RELEASE" >> $GITHUB_ENV

      - name: Build
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: mediatek/filogic
          PACKAGES: luci-app-connected
          V: s

      - name: Store packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-packages
          path: bin/packages/aarch64_cortex-a53/action/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.PKG_VERSION }}${{ env.PKG_RELEASE != '1' && format('-{0}', env.PKG_RELEASE) || '' }}"
          files: bin/packages/aarch64_cortex-a53/action/*.apk

      - name: Generate APK repo index
        run: |
          cd bin/packages/aarch64_cortex-a53/action
          apk index -o APKINDEX.tar.gz *.apk
          adbgen APKINDEX.tar.gz > packages.adb

      - name: Store packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-packages
          path: |
            bin/packages/aarch64_cortex-a53/action/*.apk
            bin/packages/aarch64_cortex-a53/action/APKINDEX.tar.gz
            bin/packages/aarch64_cortex-a53/action/packages.adb
