name: Build Package

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.arch }} build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - aarch64_cortex-a53

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Package Version
        run: |
          PKG_VERSION=$(grep '^PKG_VERSION' luci-app-connected/Makefile | cut -d= -f2 | tr -d ' ')
          PKG_RELEASE=$(grep '^PKG_RELEASE' luci-app-connected/Makefile | cut -d= -f2 | tr -d ' ')
          echo "PKG_VERSION=$PKG_VERSION" >> $GITHUB_ENV
          echo "PKG_RELEASE=$PKG_RELEASE" >> $GITHUB_ENV

      - name: Set SDK Architecture
        run: |
          echo "SDK_ARCH=${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Build
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: ${{ env.SDK_ARCH }}
          PACKAGES: luci-app-connected
          V: s

      - name: Store packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-packages
          path: bin/packages/${{ matrix.arch }}/action/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.PKG_VERSION }}${{ env.PKG_RELEASE != '1' && format('-{0}', env.PKG_RELEASE) || '' }}"
          files: bin/packages/${{ matrix.arch }}/action/*.apk

      - name: Debug - List files
        run: |
          echo "Checking for APK files..."
          find bin -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo "---"
          find . -name "APKINDEX*" -type f 2>/dev/null || echo "No APKINDEX files found"
          echo "---"
          ls -la bin/packages/${{ matrix.arch }}/action/ 2>/dev/null || echo "Directory doesn't exist"

      - name: Generate APK repo index
        run: |
          # Find the actual location of APK files
          APK_DIR=$(find bin -name "*.apk" -type f | head -1 | xargs dirname 2>/dev/null)
          if [ -z "$APK_DIR" ]; then
            echo "ERROR: No APK files found!"
            exit 1
          fi

          echo "Found APK files in: $APK_DIR"
          ls -la "$APK_DIR"

          docker run --rm \
            -v "$APK_DIR":/packages \
            alpine:latest \
            sh -c "cd /packages && apk index --allow-untrusted -o APKINDEX.tar.gz *.apk && ls -la"

      - name: Store packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-packages
          path: |
            bin/packages/${{ matrix.arch }}/action/*.apk
            bin/packages/${{ matrix.arch }}/action/APKINDEX.tar.gz

      - name: Deploy to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Clone gh-pages branch or create it
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Create temporary directory for new files
          mkdir -p /tmp/repo/${{ matrix.arch }}
          cp bin/packages/${{ matrix.arch }}/action/*.apk /tmp/repo/${{ matrix.arch }}/
          cp bin/packages/${{ matrix.arch }}/action/APKINDEX.tar.gz /tmp/repo/${{ matrix.arch }}/

          # Clone or checkout gh-pages
          git fetch origin gh-pages 2>/dev/null || echo "gh-pages branch doesn't exist yet"
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Copy files
          mkdir -p ${{ matrix.arch }}
          cp -r /tmp/repo/${{ matrix.arch }}/* ${{ matrix.arch }}/

          # Commit and push
          git add ${{ matrix.arch }}/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update packages for ${{ matrix.arch }} - $(date +%Y-%m-%d)"
            git push origin gh-pages
          fi
